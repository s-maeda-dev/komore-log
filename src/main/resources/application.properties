spring.application.name=komore-log

# MySQL Connection Settings
spring.datasource.url=jdbc:mysql://localhost:3306/komore_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Gemini API Settings
# 【セキュリティ強化】実際のキーはここには書かず、環境変数 GEMINI_API_KEY から読み込みます。
# 見つからない場合のデフォルト値を空にします。
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent?key=